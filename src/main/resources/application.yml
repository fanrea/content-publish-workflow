spring:
  application:
    name: collaborative-doc-service
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cpw}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USER:cpw}
    password: ${DB_PASSWORD:cpw}
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true
    validate-on-migrate: true
    connect-retries: 10
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2000ms

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%thread] [%X{traceId:-},%X{requestId:-}] %logger{36} - %msg%n"

# Load only collab-document related mappers.
mybatis-plus:
  mapper-locations:
    - classpath*:mybatis/CollaborativeDocumentMybatisMapper.xml
    - classpath*:mybatis/DocumentRevisionMybatisMapper.xml
    - classpath*:mybatis/DocumentOperationMybatisMapper.xml
    - classpath*:mybatis/DocumentMemberMybatisMapper.xml
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

workflow:
  storage:
    snapshot:
      # Snapshot backend: noop | filesystem
      # filesystem is a local object-storage compatible adapter for stage migration.
      # Default uses filesystem (object-storage adapter). `noop` is for local troubleshooting only.
      backend: ${DOC_SNAPSHOT_BACKEND:filesystem}
      filesystem:
        root-dir: ${DOC_SNAPSHOT_FS_ROOT_DIR:./data/snapshots}
  operation-log:
    # Operation delta store backend: mysql | filesystem | noop
    # Default uses filesystem to keep high-frequency deltas out of MySQL.
    # `mysql` remains a compatibility fallback only.
    # Any other value is treated as misconfiguration and fails startup.
    # To use mysql explicitly, mysql-compat-enabled must be true.
    backend: ${DOC_OPERATION_LOG_BACKEND:filesystem}
    mysql-compat-enabled: ${DOC_OPERATION_LOG_MYSQL_COMPAT_ENABLED:false}
    filesystem:
      root-dir: ${DOC_OPERATION_LOG_FS_ROOT_DIR:./data/operation-log}
  redis-cache:
    enabled: ${DOC_REDIS_CACHE_ENABLED:false}
    key-prefix: ${DOC_REDIS_CACHE_PREFIX:cpw:doc:cache:}
    ttl-seconds: ${DOC_REDIS_CACHE_TTL_SECONDS:1800}
  realtime:
    # Merge engine mode: ot | crdt
    # Default is crdt. Keep `ot` as compatibility fallback for phased migration.
    merge-engine: ${DOC_REALTIME_MERGE_ENGINE:crdt}
    actor-single-writer:
      # Stage2 actor single-writer switch:
      # true -> actor/queue order is write authority; DB update only checks expected revision.
      # false is treated as misconfiguration and startup fails.
      enabled: ${DOC_REALTIME_ACTOR_SINGLE_WRITER_ENABLED:true}
    gateway:
      # Strict stateless mode: gateway no longer blocks on synchronous JOIN/SYNC DB reads.
      strict-stateless: ${DOC_REALTIME_GATEWAY_STRICT_STATELESS:true}
    redis-index:
      # Enable redis-based cross-gateway room/session index.
      enabled: ${DOC_REALTIME_REDIS_INDEX_ENABLED:false}
    # Logical gateway id used in room routing/session index.
    gateway-id: ${DOC_REALTIME_GATEWAY_ID:gateway-local}
    redis-broadcast:
      # Enable redis-based cross-gateway event fanout.
      enabled: ${DOC_REALTIME_REDIS_BROADCAST_ENABLED:false}
      channel: ${DOC_REALTIME_REDIS_BROADCAST_CHANNEL:cpw:realtime:broadcast}
    recent-updates:
      # Enable recent updates hot-window cache for reconnect fast path.
      enabled: ${DOC_REALTIME_RECENT_UPDATES_ENABLED:false}
      size: ${DOC_REALTIME_RECENT_UPDATES_SIZE:200}
      ttl: ${DOC_REALTIME_RECENT_UPDATES_TTL:120s}
  gc:
    compaction:
      # Stage2 policy thresholds for compaction signal publishing.
      # Note: current code now supports in-process snapshot re-baseline execution.
      update-count-threshold: ${DOC_GC_COMPACTION_UPDATE_COUNT_THRESHOLD:200}
      growth-ratio-threshold: ${DOC_GC_COMPACTION_GROWTH_RATIO_THRESHOLD:1.5}
      time-window: ${DOC_GC_COMPACTION_TIME_WINDOW:10m}
      publish-min-interval: ${DOC_GC_COMPACTION_PUBLISH_MIN_INTERVAL:30s}
      in-process:
        # When true, task publisher executes compaction immediately in current process.
        # In-process publisher catches executor failures to avoid breaking realtime main path.
        enabled: ${DOC_GC_COMPACTION_IN_PROCESS_ENABLED:false}
      rocketmq:
        # MQ consumer retries when executor throws (consume returns SUSPEND_CURRENT_QUEUE_A_MOMENT).
        enabled: ${DOC_GC_COMPACTION_ROCKETMQ_ENABLED:false}
        name-server: ${GC_COMPACTION_ROCKETMQ_NAME_SERVER:}
        producer-group: ${GC_COMPACTION_ROCKETMQ_PRODUCER_GROUP:cpw_doc_compaction_task_producer}
        consumer-group: ${GC_COMPACTION_ROCKETMQ_CONSUMER_GROUP:cpw_doc_compaction_task_consumer}
        topic: ${GC_COMPACTION_ROCKETMQ_TOPIC:cpw_doc_compaction_task}
        send-timeout-ms: ${GC_COMPACTION_ROCKETMQ_SEND_TIMEOUT_MS:1000}
        max-retries: ${GC_COMPACTION_ROCKETMQ_MAX_RETRIES:2}
        retry-backoff-ms: ${GC_COMPACTION_ROCKETMQ_RETRY_BACKOFF_MS:50}
  ingress:
    rocketmq:
      # When true, EDIT_OP ingress goes through RocketMQ.
      enabled: ${DOC_INGRESS_ROCKETMQ_ENABLED:false}
      # Local compose default namesrv. Override via env in other environments.
      name-server: ${INGRESS_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
      producer-group: ${INGRESS_ROCKETMQ_PRODUCER_GROUP:cpw_doc_ingress_producer}
      consumer-group: ${INGRESS_ROCKETMQ_CONSUMER_GROUP:cpw_doc_ingress_consumer}
      topic: ${INGRESS_ROCKETMQ_TOPIC:cpw_doc_ingress}
      send-timeout-ms: ${INGRESS_ROCKETMQ_SEND_TIMEOUT_MS:1000}
      max-retries: ${INGRESS_ROCKETMQ_MAX_RETRIES:2}
      retry-backoff-ms: ${INGRESS_ROCKETMQ_RETRY_BACKOFF_MS:50}
  event:
    reliable:
      retry-enabled: ${DOC_EVENT_RETRY_ENABLED:true}
      retry-interval-ms: ${DOC_EVENT_RETRY_INTERVAL_MS:3000}
      fetch-limit: ${DOC_EVENT_RETRY_FETCH_LIMIT:50}
      lock-timeout-ms: ${DOC_EVENT_RETRY_LOCK_TIMEOUT_MS:30000}
      max-attempts: ${DOC_EVENT_MAX_ATTEMPTS:16}
      base-backoff-ms: ${DOC_EVENT_BASE_BACKOFF_MS:500}
      max-backoff-ms: ${DOC_EVENT_MAX_BACKOFF_MS:60000}
    rocketmq:
      enabled: ${DOC_ROCKETMQ_ENABLED:false}
      name-server: ${ROCKETMQ_NAME_SERVER:}
      producer-group: ${ROCKETMQ_PRODUCER_GROUP:cpw_doc_event_producer}
      topic: ${ROCKETMQ_DOC_TOPIC:cpw_doc_event}
      send-timeout-ms: ${ROCKETMQ_SEND_TIMEOUT_MS:3000}
      delivery-mode: ${ROCKETMQ_DELIVERY_MODE:SYNC}
      max-retries: ${ROCKETMQ_MAX_RETRIES:2}
      retry-backoff-ms: ${ROCKETMQ_RETRY_BACKOFF_MS:100}
