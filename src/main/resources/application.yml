spring:
  application:
    name: collaborative-doc-service
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cpw}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USER:cpw}
    password: ${DB_PASSWORD:cpw}
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true
    validate-on-migrate: true
    connect-retries: 10
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2000ms

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%thread] [%X{traceId:-},%X{requestId:-}] %logger{36} - %msg%n"

# 仅加载文档协作相关 mapper，避免历史模块 XML 干扰启动。
mybatis-plus:
  mapper-locations:
    - classpath*:mybatis/CollaborativeDocumentMybatisMapper.xml
    - classpath*:mybatis/DocumentRevisionMybatisMapper.xml
    - classpath*:mybatis/DocumentOperationMybatisMapper.xml
    - classpath*:mybatis/DocumentMemberMybatisMapper.xml
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

workflow:
  redis-cache:
    enabled: ${DOC_REDIS_CACHE_ENABLED:false}
    key-prefix: ${DOC_REDIS_CACHE_PREFIX:cpw:doc:cache:}
    ttl-seconds: ${DOC_REDIS_CACHE_TTL_SECONDS:1800}
  ingress:
    rocketmq:
      enabled: ${DOC_INGRESS_ROCKETMQ_ENABLED:false}
      name-server: ${INGRESS_ROCKETMQ_NAME_SERVER:}
      producer-group: ${INGRESS_ROCKETMQ_PRODUCER_GROUP:cpw_doc_ingress_producer}
      consumer-group: ${INGRESS_ROCKETMQ_CONSUMER_GROUP:cpw_doc_ingress_consumer}
      topic: ${INGRESS_ROCKETMQ_TOPIC:cpw_doc_ingress}
      send-timeout-ms: ${INGRESS_ROCKETMQ_SEND_TIMEOUT_MS:1000}
      max-retries: ${INGRESS_ROCKETMQ_MAX_RETRIES:2}
      retry-backoff-ms: ${INGRESS_ROCKETMQ_RETRY_BACKOFF_MS:50}
  event:
    reliable:
      retry-enabled: ${DOC_EVENT_RETRY_ENABLED:true}
      retry-interval-ms: ${DOC_EVENT_RETRY_INTERVAL_MS:3000}
      fetch-limit: ${DOC_EVENT_RETRY_FETCH_LIMIT:50}
      lock-timeout-ms: ${DOC_EVENT_RETRY_LOCK_TIMEOUT_MS:30000}
      max-attempts: ${DOC_EVENT_MAX_ATTEMPTS:16}
      base-backoff-ms: ${DOC_EVENT_BASE_BACKOFF_MS:500}
      max-backoff-ms: ${DOC_EVENT_MAX_BACKOFF_MS:60000}
    rocketmq:
      enabled: ${DOC_ROCKETMQ_ENABLED:false}
      name-server: ${ROCKETMQ_NAME_SERVER:}
      producer-group: ${ROCKETMQ_PRODUCER_GROUP:cpw_doc_event_producer}
      topic: ${ROCKETMQ_DOC_TOPIC:cpw_doc_event}
      send-timeout-ms: ${ROCKETMQ_SEND_TIMEOUT_MS:3000}
      delivery-mode: ${ROCKETMQ_DELIVERY_MODE:SYNC}
      max-retries: ${ROCKETMQ_MAX_RETRIES:2}
      retry-backoff-ms: ${ROCKETMQ_RETRY_BACKOFF_MS:100}
