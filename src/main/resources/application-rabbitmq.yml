spring:
  rabbitmq:
    host: ${RABBIT_HOST:127.0.0.1}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}
    virtual-host: ${RABBIT_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

# Outbox + MQ relay:
# 1) Config example only. RabbitMQ is NOT required for local dev.
# 2) Relay is disabled by default to avoid noisy startup warnings.
workflow:
  outbox:
    enabled: true
    exchange: ${WORKFLOW_OUTBOX_EXCHANGE:cpw.workflow.events}
    routingKeyPrefix: ${WORKFLOW_OUTBOX_ROUTING_KEY_PREFIX:content.}
    relay:
      enabled: false
      pollDelayMs: 1000
      batchSize: 50
      lockSeconds: 60
      maxRetries: 10
      baseDelaySeconds: 5
    topology:
      enabled: true
      search-index-queue: ${WORKFLOW_SEARCH_INDEX_QUEUE:cpw.workflow.search-index.refresh}
      read-model-queue: ${WORKFLOW_READ_MODEL_QUEUE:cpw.workflow.read-model.sync}
      notification-queue: ${WORKFLOW_NOTIFICATION_QUEUE:cpw.workflow.publish.notification}
      consumer:
        enabled: false
