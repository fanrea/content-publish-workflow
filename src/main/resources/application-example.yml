# application-example.yml
#
# 示例配置文件，用来说明本项目在本地联调或独立后端部署时常见的配置方式。
# 真实运行时更推荐通过环境变量覆盖敏感信息，不建议把密码和密钥直接提交到仓库。
#

spring:
  application:
    name: content-publish-service

  profiles:
    # 默认主路径已经是 MySQL + Flyway。
    # 本地更接近完整链路时，通常打开 redis、rabbitmq、ops。
    # 只有准备好 xxl-job-admin 时，再额外加 xxl-job。
    active: redis,rabbitmq,ops

  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cpw}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true}
    username: ${DB_USER:cpw}
    password: ${DB_PASSWORD:cpw}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  sql:
    init:
      # MySQL 统一交给 Flyway 管理，SQL init 只留给嵌入式数据库或测试。
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true
    validate-on-migrate: true
    connect-retries: 10

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2s

  cache:
    type: caffeine
    caffeine:
      spec: ${SPRING_CACHE_CAFFEINE_SPEC:initialCapacity=256,maximumSize=5000,expireAfterWrite=10m,recordStats}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: ping,db,redis
        liveness:
          include: ping

workflow:
  cache:
    # 默认本地使用 Caffeine；打开 redis profile 后，可切到本地 + Redis 两级缓存。
    two-level-enabled: ${CACHE_TWO_LEVEL_ENABLED:true}
    keyPrefix: ${CACHE_PREFIX:cpw:}
    draftDetailTtl: ${CACHE_DRAFT_DETAIL_TTL:30s}
    draftListTtl: ${CACHE_DRAFT_LIST_TTL:5s}
    draftStatusCountTtl: ${CACHE_DRAFT_STATUS_COUNT_TTL:10s}
    local:
      initial-capacity: ${CACHE_LOCAL_INITIAL_CAPACITY:256}
      maximum-size: ${CACHE_LOCAL_MAXIMUM_SIZE:5000}
      expire-after-write: ${CACHE_LOCAL_EXPIRE_AFTER_WRITE:10m}
      record-stats: ${CACHE_LOCAL_RECORD_STATS:true}
  security:
    jwt:
      issuer: ${WORKFLOW_JWT_ISSUER:content-publish-workflow}
      secret: ${WORKFLOW_JWT_SECRET:replace-with-a-real-jwt-secret-at-least-32-bytes}
      clock-skew-seconds: ${WORKFLOW_JWT_CLOCK_SKEW_SECONDS:60}
      access-token-ttl: ${WORKFLOW_JWT_ACCESS_TOKEN_TTL:2h}
    login:
      demo-users:
        - username: admin
          password: "{noop}Admin123!"
          operator-id: demo-admin
          operator-name: Demo Admin
          roles:
            - ADMIN

# 如果要接入 XXL-Job，可以额外打开 xxl-job profile，并覆盖这些环境变量：
# XXL_JOB_ADMIN_ADDRESSES=http://127.0.0.1:8088/xxl-job-admin
# XXL_JOB_ACCESS_TOKEN=default_token
# XXL_JOB_EXECUTOR_APPNAME=content-publish-workflow
# XXL_JOB_EXECUTOR_PORT=9999

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}
    path: /swagger-ui
