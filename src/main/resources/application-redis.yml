spring:
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2s
      lettuce:
        pool:
          # 连接池参数：在 QPS 上来后能显著降低频繁建连开销。
          # 注意：需要 pom.xml 引入 commons-pool2，否则这些配置不会生效。
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:2s}
  cache:
    # 当前 redis profile 仍保持 Redis CacheManager，避免在两级缓存基础设施接入前改变现有行为。
    # 同时保留 Caffeine 配置，主线程接入 layered CacheManager 后可直接复用。
    type: redis
    caffeine:
      spec: ${SPRING_CACHE_CAFFEINE_SPEC:initialCapacity=256,maximumSize=5000,expireAfterWrite=10m,recordStats}
    redis:
      time-to-live: 10m
      cache-null-values: false

workflow:
  cache:
    # redis profile 预设为两级缓存意图位；真正的本地+远端联动仍需要缓存基础设施类接入。
    two-level-enabled: ${CACHE_TWO_LEVEL_ENABLED:true}
    # 仅作为默认值；也可以通过环境变量覆盖。
    # keyPrefix 会在 Redis 中形成类似：cpw:cache:cpw:draft:detail:byId:id:123 的最终 key
    keyPrefix: ${CACHE_PREFIX:cpw:}
    draftDetailTtl: ${CACHE_DRAFT_DETAIL_TTL:30s}
    draftListTtl: ${CACHE_DRAFT_LIST_TTL:5s}
    draftStatusCountTtl: ${CACHE_DRAFT_STATUS_COUNT_TTL:10s}
    local:
      initial-capacity: ${CACHE_LOCAL_INITIAL_CAPACITY:256}
      maximum-size: ${CACHE_LOCAL_MAXIMUM_SIZE:5000}
      expire-after-write: ${CACHE_LOCAL_EXPIRE_AFTER_WRITE:10m}
      record-stats: ${CACHE_LOCAL_RECORD_STATS:true}

management:
  endpoint:
    health:
      group:
        # 开启 redis profile 后，readiness 会把 Redis 作为必须依赖。
        readiness:
          include: ping,db,redis


