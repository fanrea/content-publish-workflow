# loadtest profile: tune runtime knobs for benchmarking.
# Keep this profile off in normal development to avoid masking issues.

server:
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:200}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:5s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${ENV_NAME:loadtest}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s

logging:
  level:
    root: INFO
    org.mybatis: WARN
