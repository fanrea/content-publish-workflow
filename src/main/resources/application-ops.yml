spring:
  # ops profile is for demo/operations only.
  # Do not expose these endpoints to the public Internet without authentication.
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  # Enable access log for troubleshooting in ops environments.
  tomcat:
    accesslog:
      enabled: true
      directory: ${TOMCAT_ACCESSLOG_DIR:}
      # Use a compact pattern. %D is request time in milliseconds.
      pattern: '%h %l %u %t "%r" %s %b %D'

management:
  server:
    # Separate management port for ops usage (optional but recommended).
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        # Extend exposures for ops/demo. Keep default minimal in application.yml.
        include: health,info,metrics,prometheus,loggers,env,configprops,threaddump,httpexchanges
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${ENV_NAME:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s

logging:
  level:
    root: INFO
    com.contentworkflow: INFO

