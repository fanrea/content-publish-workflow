services:
  mysql:
    image: mysql:8.4
    container_name: cpw-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cpw
      MYSQL_USER: cpw
      MYSQL_PASSWORD: cpw
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - cpw-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: cpw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cpw-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cpw-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cpw
      RABBITMQ_DEFAULT_PASS: cpw
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - cpw-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:3.2.0
    container_name: cpw-xxl-job-admin
    restart: unless-stopped
    profiles:
      - xxl-job-admin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PARAMS: >-
        --server.port=8080
        --server.servlet.context-path=/xxl-job-admin
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root
        --xxl.job.accessToken=default_token
    ports:
      - "8088:8080"

volumes:
  cpw-mysql-data:
  cpw-redis-data:
  cpw-rabbitmq-data:
